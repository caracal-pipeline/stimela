opts:
  log:
    dir: test-logs/logs-{config.run.datetime}
    nest: 3
    symlink: logs

cabs:
  echo_params:
    flavour: python-code
    command: |
      print(f"x={x}, y={y}")
    inputs:
      x:
        dtype: str
      y:
        dtype: str
        default: "default_y"

test-cli-assign:
  inputs:
    x:
      dtype: str
      required: true
    y:
      dtype: str
      default: "default_y"
  assign:
    internal_var: "some_value"
  steps:
    echo:
      cab: echo_params
      params:
        x: =recipe.x
        y: =recipe.y
